<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shiurei Kelalim</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Heebo', Arial, sans-serif; background: #f5f5f0; color: #333; }

        header {
            background: linear-gradient(135deg, #1a1a2e, #2d4a7a);
            color: white; padding: 40px 20px; text-align: center;
        }
        header h1 { font-size: 2.8rem; margin-bottom: 8px; font-weight: 700; }
        header p  { font-size: 1.2rem; opacity: 0.85; font-weight: 300; }

        .nav-tabs {
            display: flex; flex-wrap: wrap; justify-content: center;
            gap: 12px; padding: 25px 20px; background: #fff;
            box-shadow: 0 3px 15px rgba(0,0,0,0.1);
            position: sticky; top: 0; z-index: 100;
        }
        .tab-btn {
            padding: 12px 24px; border: 2px solid #2d4a7a;
            background: white; color: #2d4a7a; border-radius: 30px;
            cursor: pointer; font-size: 1rem;
            font-family: 'Heebo', Arial, sans-serif; font-weight: 600;
            transition: all 0.3s ease;
        }
        .tab-btn:hover  { background: #2d4a7a; color: white; transform: translateY(-2px); }
        .tab-btn.active { background: #2d4a7a; color: white; box-shadow: 0 4px 12px rgba(45,74,122,0.4); }

        .content-area { padding: 30px 20px; max-width: 1100px; margin: 0 auto; }

        /* Breadcrumb */
        .breadcrumb {
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 20px; flex-wrap: wrap; min-height: 30px;
        }
        .bc-link {
            color: #2d4a7a; cursor: pointer; font-weight: 600; font-size: 1rem;
        }
        .bc-link:hover { text-decoration: underline; }
        .bc-sep { color: #bbb; font-size: 1.1rem; }
        .bc-current { color: #333; font-size: 1rem; }

        /* File list */
        .file-list {
            background: white; border-radius: 14px;
            box-shadow: 0 6px 25px rgba(0,0,0,0.10); overflow: hidden;
        }
        .file-item {
            display: flex; align-items: center; padding: 16px 22px;
            border-bottom: 1px solid #f2f2f2; cursor: pointer;
            transition: background 0.18s; gap: 14px;
        }
        .file-item:last-child { border-bottom: none; }
        .file-item:hover { background: #eef2ff; }
        .file-icon { font-size: 1.5rem; min-width: 32px; text-align: center; }
        .file-name { font-size: 1.05rem; font-weight: 500; color: #1a1a2e; flex: 1; }
        .badge {
            font-size: 0.78rem; padding: 4px 12px;
            border-radius: 20px; font-weight: 600; white-space: nowrap;
        }
        .badge-folder { background: #e8edf5; color: #2d4a7a; }
        .badge-audio  { background: #e8f5e9; color: #2e7d32; }
        .badge-file   { background: #fff3e0; color: #e65100; }

        /* Audio Player */
        .player-overlay {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 1000;
            justify-content: center; align-items: center;
        }
        .player-overlay.open { display: flex; }
        .player-box {
            background: white; border-radius: 20px;
            padding: 35px 40px; max-width: 480px; width: 92%;
            text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            position: relative;
        }
        .player-close {
            position: absolute; top: 14px; left: 18px;
            font-size: 1.6rem; cursor: pointer; color: #999;
            background: none; border: none; line-height: 1;
        }
        .player-close:hover { color: #333; }
        .player-icon { font-size: 3.5rem; margin-bottom: 12px; }
        .player-title {
            font-size: 1.2rem; font-weight: 700;
            color: #1a1a2e; margin-bottom: 20px; line-height: 1.4;
        }
        .player-box audio {
            width: 100%; border-radius: 10px; outline: none;
        }
        .player-note {
            margin-top: 14px; font-size: 0.82rem; color: #aaa;
        }

        .loading { text-align: center; padding: 60px 20px; color: #888; font-size: 1.1rem; }
        .error-box {
            text-align: center; padding: 35px 20px;
            color: #c62828; background: #ffebee;
            border-radius: 10px; line-height: 1.8;
        }
        .empty-box { text-align: center; padding: 50px; color: #aaa; }

        footer {
            text-align: center; padding: 25px;
            background: #1a1a2e; color: rgba(255,255,255,0.6);
            font-size: 0.9rem; margin-top: 50px;
        }

        @media (max-width: 600px) {
            header h1 { font-size: 1.9rem; }
            .tab-btn { padding: 9px 15px; font-size: 0.9rem; }
            .file-item { padding: 13px 14px; }
            .player-box { padding: 25px 20px; }
        }
    </style>
</head>
<body>

<header>
    <h1>🎙️ Shiurei Kelalim</h1>
    <p>שיעורי כללים</p>
</header>

<div class="nav-tabs">
    <button class="tab-btn active" onclick="showTab('orach',this)">אורח חיים</button>
    <button class="tab-btn"        onclick="showTab('yoreh',this)">יורה דעה</button>
    <button class="tab-btn"        onclick="showTab('even',this)">אבן העזר</button>
    <button class="tab-btn"        onclick="showTab('choshen',this)">חושן משפט</button>
    <button class="tab-btn"        onclick="showTab('moadim',this)">מועדים וזמנים</button>
</div>

<div class="content-area">
    <div class="breadcrumb" id="breadcrumb"></div>
    <div class="file-list"  id="file-list"><div class="loading">⏳ טוען...</div></div>
</div>

<!-- Audio Player Popup -->
<div class="player-overlay" id="player-overlay">
    <div class="player-box">
        <button class="player-close" onclick="closePlayer()">✕</button>
        <div class="player-icon">🎵</div>
        <div class="player-title" id="player-title"></div>
       <audio id="audio-player" controls autoplay controlsList="nodownload" oncontextmenu="return false;"></audio>
        <div class="player-note">© Shiurei Kelalim</div>
    </div>
</div>

<footer>
    <p>© Shiurei Kelalim — All Rights Reserved</p>
</footer>

<script>
// =========================================
// PUT YOUR GOOGLE API KEY HERE:
const API_KEY = 'AIzaSyAPagTKnIPrZgSqJiI6hwzaef-UC5HqckE';
// =========================================

const ROOT_FOLDERS = {
    orach:   { id: '1piYche6sIP7V1cPOJab3gZkzB50aeaWr', name: 'אורח חיים'     },
    yoreh:   { id: '17LSuiqsmcgpS5Nvp_tsss0YolPMGZaTY', name: 'יורה דעה'      },
    even:    { id: '1NLrWVUBhol6u9JZXne_r8FHygClrd_3W', name: 'אבן העזר'      },
    choshen: { id: '1T3JFKo9HJch6-9Gn-fsSrl-udKOA9C9e', name: 'חושן משפט'    },
    moadim:  { id: '1tBSkKyPr8OKfNoBJPTw8hIMm4ZV3yC8A', name: 'מועדים וזמנים' },
};

let navStack = [];

// Remove leading letter prefix like "א-" or "ב - "

function cleanName(n) {
    return n.replace(/^[א-ת][״"׳']?[א-ת]?[ \t\-–—]+/, '').trim();
}

function showTab(key, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    navStack = [{ id: ROOT_FOLDERS[key].id, name: ROOT_FOLDERS[key].name }];
    renderBreadcrumb();
    loadAndRender(ROOT_FOLDERS[key].id);
}

function renderBreadcrumb() {
    document.getElementById('breadcrumb').innerHTML = navStack.map((item, i) => {
        if (i === navStack.length - 1)
            return `<span class="bc-current">${item.name}</span>`;
        return `<span class="bc-link" onclick="goToLevel(${i})">${item.name}</span>
                <span class="bc-sep">›</span>`;
    }).join('');
}

function goToLevel(i) {
    navStack = navStack.slice(0, i + 1);
    renderBreadcrumb();
    loadAndRender(navStack[navStack.length - 1].id);
}

async function loadAndRender(folderId) {
    const el = document.getElementById('file-list');
    el.innerHTML = '<div class="loading">⏳ טוען...</div>';
    try {
        const q   = encodeURIComponent(`'${folderId}' in parents and trashed=false`);
        const url = `https://www.googleapis.com/drive/v3/files?q=${q}&key=${API_KEY}`
          + `&fields=files(id,name,mimeType,webContentLink,webViewLink,shortcutDetails)&orderBy=name&pageSize=500`;

        const res  = await fetch(url);
        if (!res.ok) throw new Error(`Status ${res.status}`);
        const data = await res.json();
        const files = data.files || [];

        if (!files.length) {
            el.innerHTML = '<div class="empty-box">📭 קיין פיילאס נישט</div>';
            return;
        }

        // Folders first, then files
        const sorted = [
            ...files.filter(f => f.mimeType === 'application/vnd.google-apps.folder'),
            ...files.filter(f => f.mimeType !== 'application/vnd.google-apps.folder'),
        ];

        el.innerHTML = sorted.map(f => {
           const isShortcut = f.mimeType === 'application/vnd.google-apps.shortcut';
const targetMime = isShortcut ? (f.shortcutDetails?.targetMimeType || '') : '';
const targetId   = isShortcut ? (f.shortcutDetails?.targetId || '') : '';
const isFolder   = f.mimeType === 'application/vnd.google-apps.folder' 
                || (isShortcut && targetMime === 'application/vnd.google-apps.folder');
            const name     = cleanName(f.name);
            const icon     = isFolder ? '📁' : getIcon(f.mimeType);
            const badge    = isFolder
                ? `<span class="badge badge-folder">פאלדער ›</span>`
                : isAudio(f.mimeType)
                    ? `<span class="badge badge-audio">▶ שיעור</span>`
                    : `<span class="badge badge-file">פיילע</span>`;

            const safeId       = f.id;
const safeName     = name.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');
const safeMime     = (f.mimeType||'').replace(/'/g,"\\'");
const safeTargetId = (targetId||'').replace(/'/g,"\\'");
const safeTargetM  = (targetMime||'').replace(/'/g,"\\'");

return `<div class="file-item"
            onclick="handleClick('${safeId}','${safeName}',${isFolder},'${safeMime}','${safeTargetId}','${safeTargetM}')">
                        <span class="file-icon">${icon}</span>
                        <span class="file-name">${name}</span>
                        ${badge}
                    </div>`;
        }).join('');

    } catch(err) {
        el.innerHTML = `<div class="error-box">
            ❌ Error loading files<br>
            <small>${err.message}</small><br><br>
            <small>Please make sure your API Key is correct and Google Drive API is enabled.</small>
        </div>`;
    }
}

function handleClick(id, name, isFolder, mimeType, targetId, targetMime) {
    // Handle Google Drive shortcuts
    if (mimeType === 'application/vnd.google-apps.shortcut') {
        if (targetMime === 'application/vnd.google-apps.folder') {
            navStack.push({ id: targetId, name });
            renderBreadcrumb();
            loadAndRender(targetId);
        } else if (isAudio(targetMime)) {
            openPlayer(targetId, name);
        }
        return;
    }
    if (isFolder) {
        navStack.push({ id, name });
        renderBreadcrumb();
        loadAndRender(id);
    } else if (isAudio(mimeType)) {
        openPlayer(id, name);
    } else {
        window.open(`https://drive.google.com/file/d/${id}/view`, '_blank');
    }
}

function openPlayer(fileId, name) {
    document.getElementById('player-title').textContent = name;
    document.getElementById('audio-player').src =
        `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media&key=${API_KEY}`;
    document.getElementById('player-overlay').classList.add('open');
}

function closePlayer() {
    const audio = document.getElementById('audio-player');
    audio.pause();
    audio.src = '';
    document.getElementById('player-overlay').classList.remove('open');
}

// Close player on background click
document.getElementById('player-overlay').addEventListener('click', function(e) {
    if (e.target === this) closePlayer();
});

function isAudio(m) { return m && m.includes('audio'); }
function getIcon(m) {
    if (!m) return '📎';
    if (m.includes('audio')) return '🎵';
    if (m.includes('video')) return '🎬';
    if (m.includes('pdf'))   return '📄';
    return '📎';
}

// Start
showTab('orach', document.querySelector('.tab-btn.active'));
</script>
</body>
</html>
