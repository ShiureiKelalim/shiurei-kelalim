<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shiurei Kelalim</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Heebo', Arial, sans-serif;
            background: #f5f5f0;
            color: #333;
        }

        /* ===== HEADER ===== */
        header {
            background: linear-gradient(135deg, #1a1a2e, #2d4a7a);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
        header h1 {
            font-size: 2.8rem;
            letter-spacing: 3px;
            margin-bottom: 8px;
            font-weight: 700;
        }
        header p {
            font-size: 1.2rem;
            opacity: 0.85;
            font-weight: 300;
        }

        /* ===== TABS ===== */
        .nav-tabs {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            padding: 25px 20px;
            background: #fff;
            box-shadow: 0 3px 15px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .tab-btn {
            padding: 12px 24px;
            border: 2px solid #2d4a7a;
            background: white;
            color: #2d4a7a;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            font-family: 'Heebo', Arial, sans-serif;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .tab-btn:hover {
            background: #2d4a7a;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(45,74,122,0.3);
        }
        .tab-btn.active {
            background: #2d4a7a;
            color: white;
            box-shadow: 0 4px 12px rgba(45,74,122,0.4);
        }

        /* ===== CONTENT ===== */
        .content-area {
            padding: 30px 20px;
            max-width: 1100px;
            margin: 0 auto;
        }
        .section-title {
            font-size: 1.5rem;
            color: #1a1a2e;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 3px solid #2d4a7a;
            display: none;
        }
        .section-title.active { display: block; }

        .folder-frame {
            display: none;
            width: 100%;
            height: 620px;
            border: none;
            border-radius: 12px;
            box-shadow: 0 6px 25px rgba(0,0,0,0.12);
            background: white;
        }
        .folder-frame.active { display: block; }

        /* ===== FOOTER ===== */
        footer {
            text-align: center;
            padding: 25px;
            background: #1a1a2e;
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem;
            margin-top: 50px;
        }

        /* ===== MOBILE ===== */
        @media (max-width: 600px) {
            header h1 { font-size: 1.8rem; }
            .tab-btn { padding: 9px 16px; font-size: 0.9rem; }
            .folder-frame { height: 500px; }
        }
    </style>
</head>
<body>

<!-- HEADER -->
<header>
    <h1>🎙️ Shiurei Kelalim</h1>
    <p>שיעורי כללים</p>
</header>

<!-- NAVIGATION TABS -->
<div class="nav-tabs">
    <button class="tab-btn active" onclick="showTab('orach', this)">א — אורח חיים</button>
    <button class="tab-btn" onclick="showTab('yoreh', this)">ב — יורה דעה</button>
    <button class="tab-btn" onclick="showTab('even', this)">ג — אבן העזר</button>
    <button class="tab-btn" onclick="showTab('choshen', this)">ד — חושן משפט</button>
    <button class="tab-btn" onclick="showTab('moadim', this)">ה — מועדים וזמנים</button>
</div>

<!-- CONTENT -->
<div class="content-area">

    <h2 class="section-title active" id="title-orach">📚 אורח חיים</h2>
    <iframe class="folder-frame active" id="orach"
        src="https://drive.google.com/embeddedfolderview?id=1piYche6sIP7V1cPOJab3gZkzB50aeaWr#list">
    </iframe>

    <h2 class="section-title" id="title-yoreh">📚 יורה דעה</h2>
    <iframe class="folder-frame" id="yoreh"
        src="https://drive.google.com/embeddedfolderview?id=17LSuiqsmcgpS5Nvp_tsss0YolPMGZaTY#list">
    </iframe>

    <h2 class="section-title" id="title-even">📚 אבן העזר</h2>
    <iframe class="folder-frame" id="even"
        src="https://drive.google.com/embeddedfolderview?id=1NLrWVUBhol6u9JZXne_r8FHygClrd_3W#list">
    </iframe>

    <h2 class="section-title" id="title-choshen">📚 חושן משפט</h2>
    <iframe class="folder-frame" id="choshen"
        src="https://drive.google.com/embeddedfolderview?id=1T3JFKo9HJch6-9Gn-fsSrl-udKOA9C9e#list">
    </iframe>

    <h2 class="section-title" id="title-moadim">📚 מועדים וזמנים</h2>
    <iframe class="folder-frame" id="moadim"
        src="https://drive.google.com/embeddedfolderview?id=1tBSkKyPr8OKfNoBJPTw8hIMm4ZV3yC8A#list">
    </iframe>

</div>

<!-- FOOTER -->
<footer>
    <p>© Shiurei Kelalim — All Rights Reserved</p>
</footer>

<script>
    const tabs = ['orach','yoreh','even','choshen','moadim'];

    function showTab(id, btn) {
        tabs.forEach(t => {
            document.getElementById(t).classList.remove('active');
            document.getElementById('title-' + t).classList.remove('active');
        });
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('title-' + id).classList.add('active');
        btn.classList.add('active');
    }
</script>

</body>
</html>
