<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shiurei Kelalim</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Heebo', Arial, sans-serif;
            background: #f5f5f0;
            color: #333;
         }
        header {
            background: linear-gradient(135deg, #1a1a2e, #2d4a7a);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
        header h1 { font-size: 2.8rem; letter-spacing: 3px; margin-bottom: 8px; font-weight: 700; }
        header p { font-size: 1.2rem; opacity: 0.85; font-weight: 300; }
        .nav-tabs {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            padding: 25px 20px;
            background: #fff;
            box-shadow: 0 3px 15px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .tab-btn {
            padding: 12px 24px;
            border: 2px solid #2d4a7a;
            background: white;
            color: #2d4a7a;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            font-family: 'Heebo', Arial, sans-serif;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .tab-btn:hover { background: #2d4a7a; color: white; transform: translateY(-2px); }
        .tab-btn.active { background: #2d4a7a; color: white; box-shadow: 0 4px 12px rgba(45,74,122,0.4); }
        .content-area { padding: 30px 20px; max-width: 1100px; margin: 0 auto; }
        .section-header {
            display: none;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 3px solid #2d4a7a;
        }
        .section-header.active { display: flex; }
        .section-title { font-size: 1.5rem; color: #1a1a2e; }
        .open-drive-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: #4285F4;
            color: white;
            border-radius: 25px;
            text-decoration: none;
            font-size: 0.95rem;
            font-family: 'Heebo', Arial, sans-serif;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 3px 10px rgba(66,133,244,0.3);
        }
        .open-drive-btn:hover {
            background: #3367d6;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(66,133,244,0.4);
        }
        .open-drive-btn svg { width: 18px; height: 18px; }
        .folder-frame {
            display: none;
            width: 100%;
            height: 620px;
            border: none;
            border-radius: 12px;
            box-shadow: 0 6px 25px rgba(0,0,0,0.12);
            background: white;
        }
        .folder-frame.active { display: block; }
        footer {
            text-align: center;
            padding: 25px;
            background: #1a1a2e;
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem;
            margin-top: 50px;
        }
        @media (max-width: 600px) {
            header h1 { font-size: 1.8rem; }
            .tab-btn { padding: 9px 16px; font-size: 0.9rem; }
            .folder-frame { height: 500px; }
            .section-header { flex-direction: column; gap: 10px; align-items: flex-start; }
        }
    </style>
</head>
<body>

<header>
    <h1>🎙️ Shiurei Kelalim</h1>
    <p>שיעורי כללים</p>
</header>

<div class="nav-tabs">
    <button class="tab-btn active" onclick="showTab('orach', this)">אורח חיים</button>
    <button class="tab-btn" onclick="showTab('yoreh', this)">יורה דעה</button>
    <button class="tab-btn" onclick="showTab('even', this)">אבן העזר</button>
    <button class="tab-btn" onclick="showTab('choshen', this)">חושן משפט</button>
    <button class="tab-btn" onclick="showTab('moadim', this)">מועדים וזמנים</button>

<footer>
    <p>© Shiurei Kelalim — All Rights Reserved</p>
</footer>

<script>
    const tabs = ['orach','yoreh','even','choshen','moadim'];
    function showTab(id, btn) {
        tabs.forEach(t => {
            document.getElementById(t).classList.remove('active');
            document.getElementById('header-' + t).classList.remove('active');
        });
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('header-' + id).classList.add('active');
        btn.classList.add('active');
    }
</script>

</body>
</html>
